map $uri $unity_type {
    default                "application/octet-stream";
    ~*\.js$                "application/javascript";
    ~*\.wasm$              "application/wasm";
    ~*\.json$              "application/json";
    ~*\.css$               "text/css";
    ~*\.html$              "text/html";
    ~*\.png$               "image/png";
    ~*\.jpg$               "image/jpeg";
    ~*\.svg$               "image/svg+xml";
    ~*\.ttf$               "font/ttf";
    ~*\.otf$               "font/otf";
    ~*\.mp3$               "audio/mpeg";
    ~*\.wav$               "audio/wav";
    ~*\.mp4$               "video/mp4";
}

# Map for pre-compressed encodings
# Note: Unity .unityweb files are usually Brotli compressed in modern builds
map $uri $unity_enc {
    default                "";
    ~*\.br$                "br";
    ~*\.unityweb$          "br";
    ~*\.gz$                "gzip";
}

server {
    listen 80;
    listen [::]:80;
    server_name learningcloud.et www.learningcloud.et kokeb.et;

    # Global settings
    client_max_body_size 1G;
    chunked_transfer_encoding on;

    # Gzip Compression for on-the-fly compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types 
        application/javascript 
        application/wasm 
        application/octet-stream 
        application/json 
        text/plain 
        text/css 
        text/xml 
        application/xml 
        image/x-icon 
        image/svg+xml;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    # For Let's Encrypt validation
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 1. Unity WebGL Assets (Pre-compressed or regular)
    location ^~ /api/games/serve/ {
        proxy_pass http://elearning-backend:9011;
        proxy_http_version 1.1;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Caching strategy for game assets
        add_header Vary Accept-Encoding always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        
        # Override headers from backend
        proxy_hide_header Content-Type;
        proxy_hide_header Content-Encoding;
        
        # Set headers from maps
        add_header Content-Type $unity_type always;
        add_header Content-Encoding $unity_enc always;
        
        # Optimized proxy buffering
        proxy_buffering on;
        proxy_buffers 16 1m;
        proxy_buffer_size 1m;
        proxy_max_temp_file_size 1024m;
        
        # Timeouts
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # 2. General Storage Downloads
    location ~ ^/api/storage/(download|proxy) {
        proxy_pass http://elearning-backend:9011;
        proxy_http_version 1.1;
        
        # Performance optimizations for storage/download endpoints
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_connect_timeout 3600s;
        
        # Standard proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
    }

    # 3. AI Model Proxy
    location /ai-model {
        rewrite ^/ai-model/?(.*)$ /$1 break;
        resolver 127.0.0.11 valid=10s;
        set $ai_backend letter-arrangement-ai:9014;
        proxy_pass http://$ai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 4. Payment Service Proxy
    location /payment-api/ {
        proxy_pass http://172.17.0.1:9010/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_buffering off;
    }

    # 5. Audio Translation Service Proxy
    location /audio {
        return 301 $scheme://$http_host/audio/;
    }

    location /audio/ {
        proxy_pass http://transcribe-service:9014/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /evaluate {
        proxy_pass http://transcribe-service:9014/evaluate;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 6. General Backend API Proxy
    # Uploads directory served by Backend
    location /uploads/ {
        proxy_pass http://elearning-backend:9011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_buffering off;
        add_header Cache-Control "public, max-age=86400";
    }

    location /api/ {
        proxy_pass http://elearning-backend:9011;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Pass through Cloudflare's X-Forwarded-Proto instead of overwriting with
        # $scheme (which is always 'http' since Nginx receives plain HTTP from Cloudflare)
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        # Also pass CF-Visitor so backend can detect HTTPS from Cloudflare as a fallback
        proxy_set_header CF-Visitor $http_cf_visitor;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_buffering off;
    }

    # 6b. Native App Metadata Proxy
    location /native_app/ {
        proxy_pass http://172.17.0.1:9018/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_buffering off;
    }

    location /native_app {
        return 301 $scheme://$http_host/native_app/;
    }

    # 7. Respect Minimal Games
    location /respect-minimal-games/ {
        proxy_pass http://respect-minimal-games:9014/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;

        # CORS headers for RESPECT
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Methods';
        proxy_hide_header 'Access-Control-Allow-Headers';
        proxy_hide_header 'Access-Control-Expose-Headers';

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, HEAD' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Experience-API-Version' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, HEAD';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Experience-API-Version';
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
    }

    # Specific handling for Game Assets to avoid SPA fallback (returning HTML for missing files)
    location ~* /respect-minimal-games/games/.+\.(wasm|data|unityweb|js|json|png|jpg|jpeg|gif|ico|svg|mp3|wav|ogg|mp4|webm)$ {
        proxy_pass http://respect-minimal-games:9014;
        proxy_intercept_errors on;
        recursive_error_pages on;
        error_page 404 = @game_asset_404;
        
        # Add CORS here too
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS, HEAD' always;
    }

    location @game_asset_404 {
        add_header Content-Type text/plain;
        return 404 "Game asset not found";
    }

    location /respect-minimal-games {
        return 301 $scheme://$http_host/respect-minimal-games/;
    }
    location / {
        proxy_pass http://admin-dashboard:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_buffering off;
    }
}
